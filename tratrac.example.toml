# TraTrac persisted run config — copy to a real file and edit, then run:
#   uv run tratrac --config my_run.toml
#
# This file is a documentation TEMPLATE; it is not auto-loaded. A run is fully
# described by this config: there are NO built-in defaults, so EVERY key below
# is required. Each value may be overridden on the command line by its flag
# (e.g. --conf 0.4). A "disabled" feature is still an explicit value, never a
# missing key: timing_csv = "" (off), force = false, start/end = "" (whole clip).
# See vault/19_config_file.md.
#
# The run is PERCEPTION ONLY: it writes the track record (export.out). It does not
# produce a .trj — run `tratrac-postprocess RECORD --out run.trj` afterwards (vault/22).

[input]
# The processed video. Overridden by the positional argument: `tratrac VIDEO`.
video = "clips/highway_run3.mp4"
process_fps = 0.0                 # cap processing to ~N frames/sec; 0.0 = every frame.
                                  # Decode-time decimation: faster on long clips, but fewer
                                  # frames => more BoT-SORT ID switches. See vault/18.
                                  # (.trj TIMESTEP decimation is a tratrac-postprocess flag now.)

[detector]
name = "yolov8_visdrone"          # yolov8_visdrone | rt_detr
checkpoint = "Mahadih534/YoloV8-VisDrone"   # HF repo id (rt_detr e.g. PekingU/rtdetr_r18vd)
conf = 0.25                       # detection confidence threshold, [0, 1]
filename = "visDrone.pt"          # weights file in the repo; required (unused by rt_detr)

[runtime]
device = "cpu"                    # cpu | mps | cuda | cuda:0

[calibration]
# Exactly ONE method. Specifying both is an error.
# (A) direct ground-sample distance:
meters_per_pixel = 0.05
# (B) drone geometry — comment out (A) and use:
# drone_model = "mavic_3"         # see calibration/drone_specs registry
# altitude_m  = 80.0              # metres AGL ... OR provide an SRT instead:
# srt = "clips/highway_run3.SRT"  # DJI sidecar with per-frame altitude

[ego_motion]
# ORB ego-motion (MVP1.9, see vault/05_75_mvp1_9.md). When on, detection/tracking
# run on the raw full frame and the keyframe transform is applied to the DETECTIONS
# (coordinates, not pixels) so trajectories are free of drone ego-motion and nothing
# is ever cropped to black. The anchor re-sets when too little of it stays in view.
enabled = false                   # explicit on/off; the keys below are required only when true
n_features = 2000                 # ORB keypoints per frame
match_ratio = 0.75                # Lowe ratio test, (0, 1); lower = stricter matches
min_matches = 10                  # minimum good matches to fit a transform (else assume no motion)
ransac_threshold = 3.0            # RANSAC reprojection threshold in pixels
min_anchor_overlap = 0.6          # re-anchor the keyframe when <this fraction stays in view, (0, 1)

[tracker]
det_thresh = 0.1                  # BoT-SORT detection threshold (kept below detector.conf)

# Kinematics (orientation/speed/accel) and the .trj are produced post-hoc by
# tratrac-postprocess from the record, not here — there is no [orientation] section.

[export]
out = "out/highway_run3.parquet"  # the track record (run's primary output, Parquet); overridden by --out.
                                  # Feed it to tratrac-postprocess to get a .trj (vault/22).
transform_csv = ""                # "" = off; else a per-frame ego-motion transform CSV. Requires ego_motion.enabled
                                  # (feeds `tratrac-render --transforms` to map global-frame coords back onto the raw video)
anchors_dir = ""                  # "" = off; else a directory for keyframe-anchor PNGs + manifest. Requires
                                  # ego_motion.enabled. Draw exclusion ROIs on these PNGs; pass the manifest to
                                  # tratrac-postprocess --anchors to filter tracks in those zones. See vault/21.

[window]
start = ""                        # "" = clip start; else HH:MM:SS(.ms) / MM:SS / SS
end = ""                          # "" = clip end

# Exclusion zones are NOT a run setting anymore — they are applied post-hoc and track-aware
# by `tratrac-postprocess --exclusion-zones zones.json [--anchors manifest.json]` (vault/21).

[run]
force = false                     # true = overwrite existing outputs without prompting
timing_csv = ""                   # "" = profiling off; else a CSV path for per-frame timings
